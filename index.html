<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk - Orientasi Cendekia Aksara</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap'); 
        
        :root {
            --primary-color: #005a9c;
            --secondary-color: #f7a04a;
            --bg-color: #f4f7fa;
            --text-color: #333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; padding: 20px; 
            color: var(--text-color); 
        } 

        .container { max-width: 1100px; width: 100%; margin: 0 auto; } 

        h1 { color: #003366; font-size: 1.8rem; text-align: center; margin-top: 0;}
        .hidden { display: none !important; } 

        .form-group { margin-bottom: 20px; } 
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; font-size: 0.95rem; } 
        
        input[type="email"], input[type="password"] { 
            width: 100%; padding: 12px 16px; border: 2px solid #eef1f6; 
            border-radius: 10px; font-family: inherit; font-size: 1rem; transition: all 0.3s; 
        } 
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 4px rgba(0, 90, 156, 0.1); }

        .btn { 
            padding: 12px 24px; border: none; border-radius: 10px; color: #fff; 
            background: linear-gradient(135deg, var(--primary-color), #004080);
            font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 1rem; 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
        } 
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,90,156,0.3); }

        .login-card { 
            max-width: 400px; margin: 5vh auto; background: #fff; 
            padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; } 
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; } 
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .login-card { box-shadow: none; border: 1px solid #eee; margin-top: 10px; padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 25px;">
                <i class="fa-solid fa-graduation-cap" style="font-size: 3.5rem; color: var(--primary-color);"></i>
            </div>
            <h1 style="margin-bottom: 5px;">Pekan Orientasi</h1>
            <p style="text-align:center; color:#666; margin-bottom: 30px;">Cendekia Aksara</p>
            
            <form id="form-login-unified">
                <div class="form-group">
                    <label for="login-email">Email / Identitas</label>
                    <input type="email" id="login-email" placeholder="nama@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Password akun" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn">
                    <span>Masuk</span> <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="loading-overlay" class="hidden"><div class="spinner"></div><p id="loading-text" style="color:var(--primary-color); font-weight:600; margin-top:20px;">Memuat...</p></div>

<script>
    // 1. KONFIGURASI FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyDpUWUIzPXIZN6rrNtsIqcL6VfOE2RLVl0", 
        authDomain: "mading-cf676.firebaseapp.com", 
        projectId: "mading-cf676", 
        storageBucket: "mading-cf676.appspot.com", 
        messagingSenderId: "72175203671", 
        appId: "1:72175203671:web:7a0676a55beb64bc96ba12" 
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const auth = firebase.auth();

    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');

    function showLoading(message) { loadingText.textContent = message; loadingOverlay.classList.remove('hidden'); }
    function hideLoading() { loadingOverlay.classList.add('hidden'); }

    // 2. CEK STATUS LOGIN & ARAHKAN (ROUTING)
    auth.onAuthStateChanged(async user => {
        if (user) {
            showLoading('Mengalihkan ke Dashboard...');
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                let role = 'siswa';
                if (doc.exists) { role = doc.data().role; } 
                else if (user.email.endsWith('@ac.id')) { role = 'pengajar'; }

                // Pindah halaman berdasarkan role
                if (role === 'pengajar') { window.location.href = "admin.html"; } 
                else { window.location.href = "siswa.html"; }
            } catch (error) {
                hideLoading();
                console.error("Error:", error);
            }
        } else {
            hideLoading(); // Tetap di halaman login jika belum masuk
        }
    });

    // 3. PROSES LOGIN
    document.getElementById('form-login-unified').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        showLoading('Memverifikasi...');
        auth.signInWithEmailAndPassword(email, password)
            .catch((error) => {
                hideLoading();
                let msg = "Login gagal.";
                if(error.code === 'auth/wrong-password') msg = "Password salah.";
                if(error.code === 'auth/user-not-found') msg = "Akun tidak ditemukan.";
                alert(msg);
            });
    };
</script>
</body>
</html>
